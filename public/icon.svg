<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="pick" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Pickaxe head -->
  <path d="M310 130 L390 85 L435 135 L360 185 Z" fill="url(#pick)" opacity="0.95"/>
  <!-- Pickaxe handle -->
  <rect x="155" y="240" width="38" height="185" rx="12" ry="12" fill="url(#pick)" transform="rotate(-45 174 332)" opacity="0.9"/>
  <!-- Pickaxe tip left -->
  <path d="M200 200 L150 165 L120 210 L175 235 Z" fill="url(#pick)" opacity="0.95"/>
  <!-- Play triangle (YouTube reference) -->
  <circle cx="320" cy="340" r="80" fill="rgba(255,255,255,0.12)"/>
  <polygon points="300,305 300,375 365,340" fill="white" opacity="0.9"/>
</svg>
